name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 * * 1,4' # Runs every Monday and Thursday at 9:00 AM UTC
  workflow_dispatch: # This allows you to test it manually

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat Query
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
